<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Workout Tracker - Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec6a",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102217",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.neon-glow:focus {
    box-shadow: 0 0 10px rgba(19, 236, 106, 0.4);
    border-color: #13ec6a
    }
.custom-checkbox:checked {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuClACa9lpndOI3JmV6vJS2KLH59mA_zJxJJAmnCG24-uUKCjJ36yxNyMKG9yKAmkXmS9kYb3-OinTAZrq0AmEqyitysHcR9z1DGA1taZ5MgGCzOL_5AkOSkxsVgaQD-EZ5-MjYrHy8UzACRZORgU9rGs9ROcqtUgqGnZB-Ji2lV1w6OZ3QkKc2v-gxd4mLDT61cZyNAzvXGHrBC1cuXMmYOGLeVOs5RwNIhhTnLLyW8Bnr__17owW_0_Q_QH0n6oB4ghZyyBmTwaYM)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white antialiased min-h-screen">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-white/5">
<div class="flex items-center p-4 justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white cursor-pointer">arrow_back_ios</span>
</div>
<div class="flex flex-col items-center">
<h2 class="text-white text-base font-bold leading-tight">Push Day - Hypertrophy</h2>
<p class="text-primary text-xs font-medium uppercase tracking-widest">Active Session</p>
</div>
<div class="flex w-10 items-center justify-end">
<span class="material-symbols-outlined text-white">more_vert</span>
</div>
</div>
<!-- Workout Progress Bar Component -->
<div class="px-4 pb-2">
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center text-[10px] text-white/60 font-medium uppercase tracking-tighter">
<span>Session Progress</span>
<span>2 of 6 Exercises</span>
</div>
<div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 33%;"></div>
</div>
</div>
</div>
</header>
<main class="pb-32 px-4">
<!-- Timer Component -->
<div class="flex gap-4 py-6">
<div class="flex grow basis-0 flex-col items-center gap-2 group">
<div class="flex h-16 w-full items-center justify-center rounded-2xl bg-white/5 border border-white/10 group-hover:border-primary/50 transition-colors">
<p class="text-white text-3xl font-bold tracking-tight">24</p>
</div>
<p class="text-white/50 text-[10px] font-bold uppercase tracking-widest">Minutes</p>
</div>
<div class="flex items-center pt-2">
<span class="text-white/20 text-2xl font-bold">:</span>
</div>
<div class="flex grow basis-0 flex-col items-center gap-2 group">
<div class="flex h-16 w-full items-center justify-center rounded-2xl bg-white/5 border border-white/10 group-hover:border-primary/50 transition-colors">
<p class="text-primary text-3xl font-bold tracking-tight">42</p>
</div>
<p class="text-white/50 text-[10px] font-bold uppercase tracking-widest">Seconds</p>
</div>
<div class="flex items-center pt-2">
<span class="text-white/20 text-2xl font-bold">:</span>
</div>
<div class="flex grow basis-0 flex-col items-center gap-2">
<div class="flex h-16 w-full items-center justify-center rounded-2xl bg-white/5 border border-white/10">
<p class="text-white/40 text-3xl font-bold tracking-tight">08</p>
</div>
<p class="text-white/50 text-[10px] font-bold uppercase tracking-widest">Rest</p>
</div>
</div>
<!-- Exercise Card List -->
<div class="space-y-6">
<!-- Exercise 1: Bench Press -->
<div class="flex flex-col rounded-xl overflow-hidden bg-white/5 border border-white/10">
<div class="relative h-32 w-full bg-center bg-cover" data-alt="Person performing a barbell bench press in a gym" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA4SBMlT99Pyl4wYpe73FpNW5CPIaiLRUO68w9VJF5siO7xX3bd6kbKIozvQEJC4VzoEVuj-4o76FOhDzHpQ-479cSmowqBJ8XhkyvvgiP_CgUB-fWP6PWEvyF6BOQiQBf6i_86tZpF4MWiMFY7FHPl2687QXPVB-MYKtHhXDZKmT0M2sGYkBErChJEfW1H_LTZfn6-kzKC-0FY7TB9wVdH2_izUM5pdHtoozOJavXXzF0aj5uPv_JLaH-YYVQtqXIdQalRBLm2wTg");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 to-transparent"></div>
<div class="absolute bottom-3 left-4">
<h3 class="text-white text-xl font-bold">Bench Press</h3>
<p class="text-primary/80 text-xs font-medium uppercase tracking-wide">Primary Chest</p>
</div>
<div class="absolute top-3 right-3 bg-black/40 backdrop-blur-md px-2 py-1 rounded-md">
<span class="material-symbols-outlined text-white text-sm">history</span>
<span class="text-white text-[10px] font-bold">85kg x 6</span>
</div>
</div>
<div class="p-4 space-y-4">
<!-- Table Header -->
<div class="grid grid-cols-12 gap-2 text-[10px] font-bold uppercase tracking-widest text-white/40 px-2">
<div class="col-span-2">Set</div>
<div class="col-span-4">Weight (kg)</div>
<div class="col-span-4">Reps</div>
<div class="col-span-2 text-center">Done</div>
</div>
<!-- Set Row 1 (Completed) -->
<div class="grid grid-cols-12 gap-2 items-center bg-primary/10 rounded-lg p-2 border border-primary/20">
<div class="col-span-2 text-sm font-bold text-primary">1</div>
<div class="col-span-4">
<input class="w-full bg-white/5 border-none rounded-md text-sm font-bold text-center focus:ring-1 focus:ring-primary py-1" type="number" value="80"/>
</div>
<div class="col-span-4">
<input class="w-full bg-white/5 border-none rounded-md text-sm font-bold text-center focus:ring-1 focus:ring-primary py-1" type="number" value="8"/>
</div>
<div class="col-span-2 flex justify-center">
<input checked="" class="h-6 w-6 rounded-full border-primary border-2 bg-transparent text-primary focus:ring-0 custom-checkbox" type="checkbox"/>
</div>
</div>
<!-- Set Row 2 (Active) -->
<div class="grid grid-cols-12 gap-2 items-center p-2">
<div class="col-span-2 text-sm font-bold text-white/60">2</div>
<div class="col-span-4">
<input class="w-full bg-white/10 border-none rounded-md text-sm font-bold text-center focus:ring-1 focus:ring-primary py-1 neon-glow" placeholder="80" type="number"/>
</div>
<div class="col-span-4">
<input class="w-full bg-white/10 border-none rounded-md text-sm font-bold text-center focus:ring-1 focus:ring-primary py-1 neon-glow" placeholder="8" type="number"/>
</div>
<div class="col-span-2 flex justify-center">
<input class="h-6 w-6 rounded-full border-white/20 border-2 bg-transparent text-primary focus:ring-0 custom-checkbox" type="checkbox"/>
</div>
</div>
<!-- Set Row 3 (Pending) -->
<div class="grid grid-cols-12 gap-2 items-center p-2 opacity-50">
<div class="col-span-2 text-sm font-bold text-white/60">3</div>
<div class="col-span-4">
<input class="w-full bg-white/10 border-none rounded-md text-sm font-bold text-center py-1" disabled="" placeholder="80" type="number"/>
</div>
<div class="col-span-4">
<input class="w-full bg-white/10 border-none rounded-md text-sm font-bold text-center py-1" disabled="" placeholder="8" type="number"/>
</div>
<div class="col-span-2 flex justify-center">
<input class="h-6 w-6 rounded-full border-white/20 border-2 bg-transparent focus:ring-0" disabled="" type="checkbox"/>
</div>
</div>
<button class="w-full py-2 flex items-center justify-center gap-2 border border-dashed border-white/20 rounded-lg text-white/60 text-xs font-bold uppercase tracking-widest hover:border-primary/50 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">add_circle</span>
                        Add Set
                    </button>
</div>
</div>
<!-- Exercise 2: Squats -->
<div class="flex flex-col rounded-xl overflow-hidden bg-white/5 border border-white/10">
<div class="relative h-32 w-full bg-center bg-cover" data-alt="Person performing a back squat with a barbell" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBerFh-pkjTOIlZuu1LjOqiKCUTjgZGD_OQudfBtUWA9DGzcwR3gO-wPB6UJp2ZtyqMVUsheDl6hxSUt2VmDCANKHsh2j92fYzgv8yVQCl3w7YyAU28EXwqZkjFPFVBLZbILgGvPdktp0fWo9m2EfONHrX73HEPhMjF7Yrjkpfh-2tPIY9DHFBigkOZeTFF_xNu4IsFR9whc0bAUBENVP-5UfF3dYJ4csHvcxyMMEg-bF7H_O0JgO_YW68pUABaMzvEYaBDYyD-Zpg");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 to-transparent"></div>
<div class="absolute bottom-3 left-4">
<h3 class="text-white text-xl font-bold">Barbell Squats</h3>
<p class="text-primary/80 text-xs font-medium uppercase tracking-wide">Quads &amp; Glutes</p>
</div>
</div>
<div class="p-4 space-y-4">
<div class="grid grid-cols-12 gap-2 text-[10px] font-bold uppercase tracking-widest text-white/40 px-2">
<div class="col-span-2">Set</div>
<div class="col-span-4">Weight (kg)</div>
<div class="col-span-4">Reps</div>
<div class="col-span-2 text-center">Done</div>
</div>
<div class="grid grid-cols-12 gap-2 items-center p-2">
<div class="col-span-2 text-sm font-bold text-white/60">1</div>
<div class="col-span-4">
<input class="w-full bg-white/10 border-none rounded-md text-sm font-bold text-center focus:ring-1 focus:ring-primary py-1" placeholder="100" type="number"/>
</div>
<div class="col-span-4">
<input class="w-full bg-white/10 border-none rounded-md text-sm font-bold text-center focus:ring-1 focus:ring-primary py-1" placeholder="5" type="number"/>
</div>
<div class="col-span-2 flex justify-center">
<input class="h-6 w-6 rounded-full border-white/20 border-2 bg-transparent text-primary focus:ring-0 custom-checkbox" type="checkbox"/>
</div>
</div>
<button class="w-full py-2 flex items-center justify-center gap-2 border border-dashed border-white/20 rounded-lg text-white/60 text-xs font-bold uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">add_circle</span>
                        Add Set
                    </button>
</div>
</div>
<!-- Add Exercise Global Button -->
<button class="w-full h-14 flex items-center justify-center gap-3 bg-white/5 border border-white/10 rounded-xl text-white font-bold transition-all active:scale-95">
<span class="material-symbols-outlined">fitness_center</span>
                Add Exercise
            </button>
</div>
</main>
<!-- Bottom Navigation / Action Button -->
<div class="fixed bottom-0 left-0 right-0 bg-background-dark/95 backdrop-blur-xl border-t border-white/5 p-4 pb-8">
<button class="w-full bg-primary h-14 rounded-xl flex items-center justify-center gap-2 text-background-dark text-lg font-bold shadow-[0_0_20px_rgba(19,236,106,0.3)] active:translate-y-1 transition-all">
<span class="material-symbols-outlined font-bold">task_alt</span>
            Finish Workout
        </button>
</div>
</body></html>
